name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Code
        uses: actions/checkout@v3

      - name: Deploy ke EC2 via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/sehatku-app
            git pull origin main
            sudo docker stop sehatku || true
            sudo docker rm sehatku || true
            sudo docker rmi sehatku || true
            sudo docker build -t sehatku .
            sudo docker run -d -p 80:3000 --name sehatku sehatku
